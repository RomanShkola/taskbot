services:
  tbot:
    build: .
    container_name: tbot
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    networks:
      - tbot-network

  mongodb:
    image: mongo:7.0
    container_name: tbot-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - tbot-network

  redis:
    image: redis:7-alpine
    container_name: tbot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - tbot-network

volumes:
  mongodb_data:
  redis_data:

networks:
  tbot-network:
    driver: bridge
