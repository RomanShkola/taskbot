services:
  tbot:
    build: .
    container_name: tbot
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tbot-network

  mongodb:
    image: mongo:4.4
    container_name: tbot-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - tbot-network

  redis:
    image: redis:7-alpine
    container_name: tbot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - tbot-network

volumes:
  mongodb_data:
  redis_data:

networks:
  tbot-network:
    driver: bridge
