services:
  mongodb:
    image: mongo:7.0
    container_name: tbot-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - tbot-dev-network

  redis:
    image: redis:7-alpine
    container_name: tbot-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - tbot-dev-network

volumes:
  mongodb_dev_data:
  redis_dev_data:

networks:
  tbot-dev-network:
    driver: bridge
